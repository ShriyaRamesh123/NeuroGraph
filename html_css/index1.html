<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fixed Vanta Background Scroll</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      color: white; /* make all text white by default */
      font-family: Arial, sans-serif;
    }

    #vanta-bg {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 100px 20px;
    }

    .hero-text h1 {
      font-size: 3em;
      margin-bottom: 0.5em;
      color: white; /* explicitly white */
    }

    .hero-text p {
      font-size: 1.2em;
      color: white;
    }

    .black-scroll {
      margin-top: 50px;
    }

    /* Ensure links are visible too */
    a {
      color: #00ffff; /* cyan glow style */
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- Fixed Vanta Background Layer -->
  <div id="vanta-bg"></div>

  <!-- Foreground Content: scrollable -->
  <div class="content">
    <div class="hero-text">
      <h1>NeuroGraph</h1>
      <p>Autism Spectrum Disorder detection</p>
    </div>

    <section class="black-scroll">
      <iframe src="http://127.0.0.1:8050/" width="100%" height="1200" style="border:none; background:black; color:white;" scrolling="no"></iframe>
    </section>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.globe.min.js"></script>
  <script>
    VANTA.GLOBE({
      el: "#vanta-bg",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.0,
      scaleMobile: 1.0,
      color: 0x8833ff,          // glowing halo color
      backgroundColor: 0x000000 // black
    })
  </script>
</body>
</html>
